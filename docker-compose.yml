version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: auto_ide_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: auto_ide
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: auto_ide_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: auto_ide_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql+psycopg2://postgres:postgrespassword@db:5432/auto_ide
      - REDIS_URL=redis://redis:6379/0
      - DOCKER_HOST=unix:///var/run/docker.sock
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - db
      - redis

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: auto_ide_worker
    restart: always
    command: python app/worker.py
    environment:
      - DATABASE_URL=postgresql+psycopg2://postgres:postgrespassword@db:5432/auto_ide
      - REDIS_URL=redis://redis:6379/0
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
